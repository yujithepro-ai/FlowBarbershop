<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW BARBERSHOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: black;
      color: white;
    }
    /* Hero Section */
    .hero {
      position: relative;
      width: 100%;
      min-height: 60vh;
      background: url('images/flowbarbershopimage2.png') center top / cover no-repeat;
    }
    .hero::before {
      content: '';
      position: absolute;
      top:0; left:0; width:100%; height:100%;
      background-color: rgba(0,0,0,0.5); /* overlay so text is readable */
    }
    .hero-content {
      position: relative;
      z-index:1;
      text-align: center;
      padding: 5rem 1rem;
    }
    .hero-content h1 {
      font-size: 4rem;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
      margin: 0;
    }
    .hero-content p {
      font-size: 1.5rem;
      margin-top: 1rem;
      text-shadow: 1px 1px 8px rgba(0,0,0,0.7);
    }
    /* Location Section */
    .location {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 3rem 1rem;
    }
    .location h2 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .location p {
      font-size: 1.5rem;
      margin: 0.5rem 0;
    }
    /* Map Section */
    .map-container {
      width: 100%;
      height: 50vh;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>FLOW BARBERSHOP</h1>
      <p>Fresh cuts, clean fades, and precise beard grooming</p>
    </div>
  </section>

  <!-- Location & Hours -->
  <section class="location">
    <h2>Visit Us</h2>
    <p>914 Concord St #2, Framingham, MA 01701</p>
    <p>Phone: (774) 204-1313</p>
    <p>Hours:</p>
    <p>Monday – Saturday: 9:00 AM – 7:00 PM</p>
    <p>Sunday: Closed</p>
  </section>

  <!-- Google Maps -->
  <section class="map-container">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2948.887168152389!2d-71.4181826845443!3d42.30932717918996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89e37a59e0f3b4e3%3A0x3f1f2f30e21db2b!2sFLOW%20BARBERSHOP!5e0!3m2!1sen!2sus!4v1699138000000!5m2!1sen!2sus" 
      allowfullscreen="" 
      loading="lazy" 
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </section>

</body>
</html>
