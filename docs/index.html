<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW BARBERSHOP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth shrink effect for header */
    header {
      transition: height 0.3s ease;
    }
    header.shrink {
      height: 160px; /* smaller height when scrolled */
    }
    header h1 {
      transition: font-size 0.3s ease;
    }
    header.shrink h1 {
      font-size: 2rem; /* shrink the text */
    }
    header p {
      transition: font-size 0.3s ease;
    }
    header.shrink p {
      font-size: 1rem; /* shrink the subtext */
    }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Header with background image and overlay -->
  <header id="hero" class="relative h-64 sm:h-72 md:h-80 flex items-center justify-center">
    <div class="absolute inset-0 bg-black opacity-40"></div> <!-- overlay -->
    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-4"
         style="background-image: url('images/flowbarbershopimage2.png'); background-size: contain; background-repeat: no-repeat; background-position: center;">
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold text-white text-center leading-snug">FLOW BARBERSHOP</h1>
      <p class="text-base sm:text-lg md:text-2xl text-white mt-2 text-center leading-snug">Fresh cuts, clean fades, and precise beard grooming.</p>
    </div>
  </header>

  <!-- Location & Hours Section -->
  <section class="py-16 px-6 bg-white max-w-5xl mx-auto rounded-2xl shadow-lg -mt-12 relative z-10">
    <h2 class="text-4xl font-bold mb-8 text-center">Location & Hours</h2>
    <div class="space-y-6 md:space-y-0 md:grid md:grid-cols-1 md:gap-8 items-center">
      <div class="text-center md:text-left space-y-4">
        <p class="text-2xl font-semibold">Address:</p>
        <p class="text-xl">914 Concord St #2, Framingham, MA 01701</p>
        <p class="text-2xl font-semibold mt-4">Hours:</p>
        <p class="text-xl">Monday - Saturday: 9:00 AM – 7:00 PM</p>
        <p class="text-xl">Sunday: Closed</p>
        <p class="text-2xl font-semibold mt-4">Phone:</p>
        <p class="text-xl">(774) 204-1313</p>
        <div class="mt-6 flex justify-center gap-4">
          <a href="https://www.google.com/maps/search/?api=1&query=914+Concord+St+Framingham+MA" target="_blank" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Google Maps</a>
          <a href="https://maps.apple.com/?address=914+Concord+St,+Framingham,+MA+01701" target="_blank" class="px-4 py-2 bg-gray-800 text-white rounded-lg">Apple Maps</a>
        </div>
      </div>
    </div>

    <!-- Flow Barbershop Image below location -->
    <div class="mt-12 flex justify-center">
      <img src="images/flowbarbershopimage1.png" alt="Flow Barbershop" class="w-3/4 md:w-1/2 h-auto rounded-xl shadow-lg">
    </div>
  </section>

  <!-- Shrinking header script -->
  <script>
    const header = document.getElementById('hero');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('shrink');
      } else {
        header.classList.remove('shrink');
      }
    });
  </script>

</body>
</html>
